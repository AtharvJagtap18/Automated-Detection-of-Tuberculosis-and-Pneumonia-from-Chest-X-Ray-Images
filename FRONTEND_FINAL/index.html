<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TB Detection | Login</title>
  <script src="assets/js/theme.js"></script>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="auth-page">
  <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch color mode">
    <span class="toggle-shell" aria-hidden="true">
      <span class="icon-sun"></span>
      <span class="toggle-knob"></span>
      <span class="icon-moon"></span>
    </span>
  </button>

  <div class="bg-orb orb-a" aria-hidden="true"></div>
  <div class="bg-orb orb-b" aria-hidden="true"></div>

  <main class="auth-shell">
    <section class="login-card">
      <p class="eyebrow">Clinical AI Platform</p>
      <h1>TB Detection</h1>
      <p class="subtitle">AI-assisted chest X-ray triage for faster, consistent screening workflows.</p>

      <form id="loginForm" class="auth-form">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="Enter username" required>

        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter password" required>

        <button type="submit">Sign In</button>
      </form>

      <p class="footer">Capstone Project</p>
    </section>
  </main>

  <script src="assets/js/script.js"></script>
</body>
</html>
